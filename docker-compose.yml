services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atrium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atrium}
      POSTGRES_DB: ${POSTGRES_DB:-atrium}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atrium} -d ${POSTGRES_DB:-atrium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Migrations (incl. the EXCLUDE constraint) then the idempotent seed (skips a
    # non-empty DB) run before the API starts, so `docker compose up` gives a demo-ready stack.
    command: ["sh", "-c", "bun run packages/db/src/migrate.ts && bun run packages/db/src/seed.ts && bun run apps/api/src/index.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-atrium}:${POSTGRES_PASSWORD:-atrium}@db:5432/${POSTGRES_DB:-atrium}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me-openssl-rand-base64-32}
      BETTER_AUTH_URL: http://localhost:3001
      WEB_ORIGIN: http://localhost:5173
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
