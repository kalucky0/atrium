# Phase 1: Postgres only. api + web services are added in Phase 6.
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atrium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atrium}
      POSTGRES_DB: ${POSTGRES_DB:-atrium}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atrium} -d ${POSTGRES_DB:-atrium}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
